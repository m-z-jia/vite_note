name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
    paths: ['docs/**']

  workflow_dispatch:

# 关键：给 workflow 授予 Pages 部署权限
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build VuePress site
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4 # GitHub 官方部署 Action，彻底解决权限问题
        with:
          artifact_name: github-pages
          github_token: ${{ secrets.GITHUB_TOKEN }}
